# TelegramMediaRelayBot stack: bot + local Bot API server (2 GB file limit).
#
# Prerequisites:
#   1. Copy .env.example to .env and fill TELEGRAM_API_ID / TELEGRAM_API_HASH
#      (one-time, from https://my.telegram.org -> API development tools).
#   2. A local VPN/proxy client listening on 127.0.0.1:<port> (SOCKS5/HTTP).
#      Both containers use host networking, so they reach it exactly like a
#      process on the host does — no need to expose the proxy on 0.0.0.0.
#      Set VPN_PROXY_* in .env.
#   3. FIRST switch from the cloud API: call logOut once BEFORE starting
#      (token is then locked out of the cloud API for ~10 minutes):
#        curl "https://api.telegram.org/bot<TOKEN>/logOut"
#   4. Autostart on boot: `systemctl enable docker` — restart: unless-stopped
#      brings the whole stack back up after every reboot.
#
# Large files: bot and bot-api share ./data/telegram-bot-api at the SAME path,
# so the bot sends media as file:// URIs and the server reads them from disk
# (no HTTP upload, no memory blow-up — 2 GB files included).
#
# Host networking is used so the stack reaches a loopback-only VPN client and
# keeps everything on localhost; suits a single-host self-hosted deployment.

services:
  bot:
    build:
      context: .
      # Build in host network so the restore/publish steps can reach the host's
      # proxy at 127.0.0.1 — NuGet is otherwise unreachable via the system
      # tunnel's exit. Only those steps are proxied (see BUILD_PROXY in the
      # Dockerfile); apt/pypi go direct. Leave BUILD_PROXY empty if NuGet is
      # directly reachable on your network.
      network: host
      args:
        BUILD_PROXY: socks5://127.0.0.1:2080
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/app/data
      - ./appsettings.json:/app/appsettings.json:ro
      - ./data/telegram-bot-api:/var/lib/telegram-bot-api
    environment:
      Bot__ApiBaseUrl: "http://127.0.0.1:8081"
      # The bot talks to the LOCAL bot-api over loopback; the Telegram tunnel is
      # the bot-api container's job (--tdlib-proxy-*). So the bot itself uses no
      # proxy. (.NET also rejects socks5h, which only the yt-dlp downloader needs.)
      Bot__Proxy: ""
      # No browser inside the container: cookies-from-browser can't work here.
      # For auth-walled sites, export cookies to a file on the host and mount it,
      # then set Download__CookiesFile instead.
      Download__CookiesFromBrowser: ""
      Download__TempDir: "/var/lib/telegram-bot-api/tmrb"
      Database__ConnectionString: "Data Source=/app/data/TelegramMediaRelayBot.db"
      Proxies__vpn: "socks5h://127.0.0.1:${VPN_PROXY_PORT}"
    depends_on:
      - telegram-bot-api

  # Upstream telegram-bot-api + a small patch adding REAL proxy flags for the
  # server<->Telegram-DC (MTProto) connection — the stock server cannot proxy it.
  telegram-bot-api:
    image: ghcr.io/avbor/docker-telegram-bot-api:latest
    restart: unless-stopped
    network_mode: host
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
    command:
      - "--local"
      - "--http-port=8081"
      - "--dir=/var/lib/telegram-bot-api"
      - "--tdlib-proxy-type=${VPN_PROXY_TYPE}"
      - "--proxy-server=127.0.0.1"
      - "--proxy-port=${VPN_PROXY_PORT}"
    volumes:
      - ./data/telegram-bot-api:/var/lib/telegram-bot-api
